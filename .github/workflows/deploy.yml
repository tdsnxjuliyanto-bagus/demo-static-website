# ============================================================================
#  Azure Static Web Apps — CI/CD
#
#  INI SATU-SATUNYA workflow deploy. Kalau ada file lain hasil generate Azure
#  (azure-static-web-apps-*.yml), HAPUS — dua workflow akan sama-sama men-deploy
#  ke resource yang sama dan saling menimpa.
# ============================================================================
name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [main]
  # Rebuild mingguan: badge Credly & repo GitHub ditarik saat BUILD, jadi tanpa
  # ini isinya membeku sampai commit berikutnya.
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  build_and_deploy_job:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          lfs: false

      # Gagal lebih awal dengan pesan jelas bila secret tidak terbaca.
      # Azure hanya bilang "deployment_token was not provided", yang tidak
      # menjelaskan APAKAH secret-nya salah nama, salah tab, atau belum dibuat.
      # Mencetak PANJANG token aman — nilainya sendiri tidak pernah ditampilkan.
      - name: Verify deployment token
        env:
          TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "::error::Secret AZURE_STATIC_WEB_APPS_API_TOKEN kosong atau tidak ada."
            echo "Periksa: Settings > Secrets and variables > Actions"
            echo "  - harus di tab SECRETS (bukan Variables)"
            echo "  - harus Repository secret (bukan Environment secret)"
            echo "  - nama persis: AZURE_STATIC_WEB_APPS_API_TOKEN"
            exit 1
          fi
          echo "Token terbaca (panjang ${#TOKEN} karakter)."

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        env:
          # Dipakai src/lib/fetchProjects.mjs — menaikkan rate limit GitHub API
          # dari 60/jam (anonim) ke 5000/jam supaya fetch repo tidak kena 403.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Nama secret ini dibuat otomatis oleh Azure saat SWA disambungkan ke
          # repo. Jangan diganti kecuali Anda juga menggantinya di GitHub
          # Settings > Secrets and variables > Actions.
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: '/'        # root repo (Astro)
          api_location: 'api'      # managed functions
          output_location: 'dist'  # relatif terhadap app_location

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: 'close'
